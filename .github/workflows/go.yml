name: Go
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3 
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v4 
        with:
          go-version: '1.21'

      - name: Update profile README.md
        run: go run update.go

      - name: Commit Update & Push
        run: |
          git config user.name 'Joseph García'
          git config user.email '5715388+joseph-sx@users.noreply.github.com'
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "bot: update README.md"
          git pull --rebase origin master
          git push origin master